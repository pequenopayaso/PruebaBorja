<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayStation Collection</title>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 PlayStation Collection 🎮</h1>
            <p>Base de datos personal de videojuegos</p>
        </header>

        <nav class="navbar">

            <a href="index.html" class="active">Inicio</a>

            <a href="estadisticas.html">Estadísticas</a>

            <a href="anadir.html">Añadir Juego</a>

        </nav>

        <section class="stats">
            <div class="stat-card">
                <h2>Total Juegos</h2>
                <p id="total-games">0</p>
            </div>

            <div class="stat-card">
                <h2>Terminados</h2>
                <p id="completed-games">0</p>
            </div>

            <div class="stat-card">
                <h2>Completados</h2>
                <p id="fully-completed-games">0</p>
            </div>

            <div class="stat-card">
                <h2>Platinos</h2>
                <p id="platinum-games">0</p>
            </div>

        </section>

        <section class="search-section">

            <input
                type="text"
                id="search-input"
                placeholder="Buscar videojuego..."
            >

        </section>

        <section class="filters">

            <select id="platform-filter">
                <option value="">Todas las plataformas</option>
            </select>

            <select id="genre-filter">
                <option value="">Todos los géneros</option>
            </select>

            <select id="format-filter">
                <option value="">Todos los formatos</option>
            </select>

            <select id="finished-filter">
                <option value="">Todos</option>
                <option value="SI">Terminados</option>
                <option value="NO">No Terminados</option>
            </select>
            
        </section>

        <p id="results-counter"></p>
        
        <section id="games-container">

        </section>

    </div>

    <div id="game-modal" class="modal">

        <div class="modal-content">
            <span id="close-modal">&times;</span>
            <div id="modal-body"></div>
        </div>
        
    </div>

    <script src="js/app.js"></script>

</body>
</html>
